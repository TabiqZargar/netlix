<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Cedarville+Cursive&family=Cookie&family=Italianno&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <style>
    body {
      padding: 0;
      margin: 0;
      background-color: black;
      min-height: 100vh;
      font-family: "Playfair Display", serif;
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .logo img {
      -webkit-user-drag: none;
    }

    /* CONTAINER */
    .container {
      height: 100vh;
      width: 100vw;
      max-height: 800px;
      max-width: 1280px;
      min-height: 600px;
      min-width: 1000px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin: 0 auto;
    }

    .border {
      height: 379px;
      width: 290px;
      background: transparent;
      border-radius: 10px;
      position: relative;
      transition: border 1s;
    }

    .card:hover .border {
      border: 1px solid white;
    }

    .card {
      height: 300px;
      width: 270px;
      border-radius: 10px;
      overflow: hidden;
      background: black;
      box-shadow: 0 70px 63px -60px #000;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      transition: background 0.8s;
    }

    .card0 {
      background: url("https://i.pinimg.com/736x/8f/a0/51/8fa051251f5ac2d0b756027089fbffde--terry-o-neill-al-pacino.jpg")
        center center no-repeat;
      background-size: 300px;
    }

    .card0:hover {
      background-position: left center;
      background-size: 600px;
    }

    .card1 {
      background: url("https://i.pinimg.com/originals/28/d2/e6/28d2e684e7859a0dd17fbd0cea00f8a9.jpg")
        center center no-repeat;
      background-size: 300px;
    }

    .card1:hover {
      background-position: left center;
      background-size: 600px;
    }

    .card2 {
      background: url("https://i.pinimg.com/originals/ee/85/08/ee850842e68cfcf6e3943c048f45c6d1.jpg")
        center center no-repeat;
      background-size: 300px;
    }

    .card2:hover {
      background-position: left center;
      background-size: 600px;
    }

    h2 {
      font-family: Helvetica, Arial, sans-serif;
      color: white;
      margin: 20px;
      opacity: 0;
      transition: opacity 1s;
    }

    .card:hover h2 {
      opacity: 1;
    }

    .icons {
      position: absolute;
      color: white;
      height: 130px;
      top: 226px;
      width: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-around;
      opacity: 0;
      transition: opacity 1s;
    }

    .card:hover .icons {
      opacity: 1;
    }
    .screen {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: column;
      flex-direction: column;
      color: white;
      font-size: 4rem;
      letter-spacing: 5px;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        to right,
        rgba(229, 9, 20, 0.45) 0%,
        rgba(0, 0, 0, 0) 25%,
        rgba(0, 0, 0, 0) 75%,
        rgba(229, 9, 20, 0.45) 100%
      );
    }
    .heading {
      position: absolute;
      top: 140px;
      left: 50%;
      transform: translateX(-50%);

      font-size: 1.8rem;
      letter-spacing: 4px;
      font-weight: 500;
      font-family: "Playfair Display", serif;

      color: white;
      z-index: 3;
      pointer-events: none;
    }

    .heading::after {
      content: "";
      display: block;
      width: 90px;
      height: 2px;
      background: #e50914;
      margin: 10px auto 0;
    }
    /* .text {
      width: 100px;
      margin-top: 100px;
    } */
  </style>

  <body>
    <div class="screen">
      <!-- <div class="text">Actors to watch</div> -->
      <div class="logo">
        <img src="./Netflix_Logo_RGB.png" alt="" srcset="" width="300px" />
      </div>
      <div class="heading">ACTORS TO WATCH:</div>

      <div class="container">
        <div class="card card0">
          <div class="border">
            <h2>Al Pacino</h2>
            <div class="icons">
              <i class="fa fa-codepen" aria-hidden="true"></i>
              <i class="fa fa-instagram" aria-hidden="true"></i>
              <i class="fa fa-dribbble" aria-hidden="true"></i>
              <i class="fa fa-twitter" aria-hidden="true"></i>
              <i class="fa fa-facebook" aria-hidden="true"></i>
            </div>
          </div>
        </div>
        <div class="card card1">
          <div class="border">
            <h2>Ben Stiller</h2>
            <div class="icons">
              <i class="fa fa-codepen" aria-hidden="true"></i>
              <i class="fa fa-instagram" aria-hidden="true"></i>
              <i class="fa fa-dribbble" aria-hidden="true"></i>
              <i class="fa fa-twitter" aria-hidden="true"></i>
              <i class="fa fa-facebook" aria-hidden="true"></i>
            </div>
          </div>
        </div>
        <div class="card card2">
          <div class="border">
            <h2>Patrick Stewart</h2>
            <div class="icons">
              <i class="fa fa-codepen" aria-hidden="true"></i>
              <i class="fa fa-instagram" aria-hidden="true"></i>
              <i class="fa fa-dribbble" aria-hidden="true"></i>
              <i class="fa fa-twitter" aria-hidden="true"></i>
              <i class="fa fa-facebook" aria-hidden="true"></i>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
